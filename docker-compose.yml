services:

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: backend
    working_dir: /app
    env_file:
      - ./.env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      # Whole repo root, additionally — lets `docker exec -w /repo backend
      # pytest tests/backend/...` run the top-level test suite (which
      # imports as `backend.app...`, matching the host repo layout) from
      # inside the Docker network, reaching Postgres/Redis via their
      # container hostnames. The main app process is unaffected since its
      # own working_dir/mount above is untouched.
      - .:/repo
    ports:
      - "8000:8000"
    healthcheck:
      # Only defined here, not in the shared Dockerfile — taskiq_worker/alembic
      # use the same image but don't serve HTTP. Hits /health/ready (checks DB +
      # Redis connectivity), not just the static "/" welcome route, so a backend
      # that's up but can't reach its dependencies is correctly reported unhealthy.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      target: dev
    container_name: frontend
    working_dir: /app
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy

  taskiq_worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: taskiq_worker
    working_dir: /app
    env_file:
      - ./.env
    command: sh -c "taskiq worker app.taskiq_tasks.email_tasks:broker --reload"
    environment:
      - REDIS_URL=${REDIS_URL}
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    # Override backend.Dockerfile's inherited HEALTHCHECK, which curls
    # localhost:8000/health/ready — taskiq_worker shares that image but
    # serves no HTTP at all, so the inherited check always fails and
    # reports this container as permanently "unhealthy" even when the
    # worker itself is running fine. This checks the actual worker process
    # via /proc directly — this slim image has neither `pgrep` nor `ps`.
    healthcheck:
      test: ["CMD-SHELL", "for p in /proc/[0-9]*/cmdline; do grep -aq taskiq \"$$p\" 2>/dev/null && exit 0; done; exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  alembic:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: alembic
    working_dir: /app
    env_file:
      - ./.env
    command: alembic upgrade head
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
