services:

  postgres:
    image: postgres:15
    restart: always
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Runs once, only against a fresh/empty data volume — creates the
      # separate "bugsink" database the optional Bugsink service below
      # uses, on this same Postgres server rather than a second container.
      # See docker/postgres-init/init-bugsink-db.sh for the "already-
      # initialized volume" fallback. Harmless to mount even if you never
      # enable the "monitoring" profile — an unused empty database costs
      # nothing.
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      # Host-side port intentionally non-default (5432 is the single most
      # common local collision point on dev machines running other Postgres
      # instances/containers) — containers still reach this over the Docker
      # network at postgres:5432 regardless of the host mapping.
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    restart: always
    # REDIS_PASSWORD empty (the local-dev default) makes --requirepass a
    # no-op, preserving today's no-auth behavior; set it in .env to require
    # auth (must also be embedded in REDIS_URL — see .env.example).
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-}"]
    ports:
      # Same rationale as postgres above — non-default host port to dodge
      # the common local 6379 collision; internal traffic still uses
      # redis:6379 over the Docker network.
      - "6380:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD:-}\" --no-auth-warning ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    working_dir: /app
    env_file:
      - ./.env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir app --access-log
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      alembic:
        condition: service_completed_successfully   # Don't serve traffic on a schema the migration hasn't applied yet
    volumes:
      - ./backend:/app
      # Whole repo root, additionally — lets `docker compose exec -w /repo
      # backend pytest tests/backend/...` run the top-level test suite (which
      # imports as `backend.app...`, matching the host repo layout) from
      # inside the Docker network, reaching Postgres/Redis via their
      # container hostnames. The main app process is unaffected since its
      # own working_dir/mount above is untouched.
      - .:/repo
    ports:
      - "8000:8000"
    healthcheck:
      # Only defined here, not in the shared Dockerfile — taskiq_worker/alembic
      # use the same image but don't serve HTTP. Hits /health/ready (checks DB +
      # Redis connectivity), not just the static "/" welcome route, so a backend
      # that's up but can't reach its dependencies is correctly reported unhealthy.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      target: dev
    working_dir: /app
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy

  taskiq_worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    working_dir: /app
    env_file:
      - ./.env
    command: sh -c "taskiq worker app.taskiq_tasks.email_tasks:broker"
    environment:
      - REDIS_URL=${REDIS_URL}
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      alembic:
        condition: service_completed_successfully   # Don't process jobs against a schema the migration hasn't applied yet
    volumes:
      - ./backend:/app
    # Override backend.Dockerfile's inherited HEALTHCHECK, which curls
    # localhost:8000/health/ready — taskiq_worker shares that image but
    # serves no HTTP at all, so the inherited check always fails and
    # reports this container as permanently "unhealthy" even when the
    # worker itself is running fine. This checks the actual worker process
    # via /proc directly — this slim image has neither `pgrep` nor `ps`.
    healthcheck:
      test: ["CMD-SHELL", "for p in /proc/[0-9]*/cmdline; do grep -aq taskiq \"$$p\" 2>/dev/null && exit 0; done; exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  alembic:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    working_dir: /app
    env_file:
      - ./.env
    command: alembic upgrade head
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # Optional, self-hosted error monitoring (Sentry-SDK-compatible — see
  # docs/error-monitoring/overview.md). Disabled by default: `docker compose up`
  # never starts this service on its own. Bring it up explicitly with:
  #   docker compose --profile monitoring up -d
  # (or add bugsink to an explicit service list: `docker compose up backend
  # frontend bugsink`, which also works regardless of profiles). This is
  # infrastructure for local/self-hosted error monitoring, not part of the
  # application itself — SENTRY_DSN (backend/app/core/settings.py,
  # frontend .env.example) is what actually turns error reporting on, and
  # stays unset (fully disabled) whether or not this container is running.
  bugsink:
    image: bugsink/bugsink:2
    restart: always
    profiles: ["monitoring"]
    env_file:
      - ./.env
    environment:
      SECRET_KEY: ${BUGSINK_SECRET_KEY}
      CREATE_SUPERUSER: ${BUGSINK_SUPERUSER_EMAIL}:${BUGSINK_SUPERUSER_PASSWORD}
      PORT: "8000"
      # Same Postgres server this template already runs, different
      # database (see postgres service's init-bugsink-db.sh above) —
      # avoids a second Postgres container just for this.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/bugsink
      BEHIND_HTTPS_PROXY: "false"
      BASE_URL: ${BUGSINK_BASE_URL:-http://localhost:8010}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # Host-side port intentionally non-default and distinct from the
      # backend's own 8000 — same "avoid collisions" reasoning as
      # postgres/redis above.
      - "8010:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import requests; requests.get('http://localhost:8000/health/ready').raise_for_status()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  postgres_data:
