# Serves the built React SPA. All non-file paths fall back to index.html so
# client-side routing (react-router) works on a hard refresh/deep link —
# without this, refreshing on e.g. /dashboard would 404 at the nginx level.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Security headers for the SPA itself — mirrors the reasoning in
    # backend/app/core/security_headers_middleware.py, scoped for an actual
    # HTML/JS/CSS document instead of a JSON-only API (which can use the far
    # stricter default-src 'none'). connect-src is intentionally left open
    # to http(s): since the API origin is a runtime-configurable env var
    # (VITE_API_BASE_URL) baked in at build time, not something this static
    # config can know — tighten to the real API origin for a specific
    # deployment. HSTS is deliberately NOT set here: this container serves
    # plain HTTP (see DEPLOYMENT.md — TLS termination happens in front of
    # it), and HSTS on a plain-HTTP response has no effect; set it on
    # whatever terminates TLS instead.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' http: https:; frame-ancestors 'none'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
