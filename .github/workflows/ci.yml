name: CI

# Runs on every push and pull request targeting main. Three independent jobs
# (backend, frontend, docker build) run in parallel.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (unit + integration)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mystic_auth_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mystic_auth_ci"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      # Test-only values — never real secrets. Settings requires every one
      # of these to be set, so CI provides them directly as environment
      # variables instead of using a checked-in .env file.
      BACKEND_BASE_URL: http://localhost:8000
      FRONTEND_BASE_URL: http://localhost:5173

      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/mystic_auth_ci
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mystic_auth_ci

      SECRET_KEY: ci-test-secret-key-not-for-production-use-only

      ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      REFRESH_TOKEN_EXPIRE_MINUTES: "43200"
      JWT_ALGORITHM: HS256
      RESET_TOKEN_EXPIRE_MINUTES: "60"

      GOOGLE_CLIENT_ID: ci-test-google-client-id
      GOOGLE_CLIENT_SECRET: ci-test-google-client-secret
      GOOGLE_REDIRECT_URI: http://localhost:8000/auth/oauth2/callback/google

      REDIS_URL: redis://localhost:6379/0
      CACHE_DEFAULT_TTL: "300"

      FROM_EMAIL: ci-test@example.com
      GMAIL_APP_PASSWORD: ci-test-app-password

      APP_NAME: MysticAuth

      LOGIN_LOCKOUT_TIME: "300"
      MAX_FAILED_LOGIN_ATTEMPTS: "5"
      LOGIN_LOCKOUT_TIME_PER_IP: "300"
      MAX_FAILED_LOGIN_ATTEMPTS_PER_IP: "20"

      MAX_REQUESTS_PER_WINDOW: "100"
      REQUEST_WINDOW_SECONDS: "60"

      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install --no-cache-dir -r backend/requirements.txt

      - name: Audit Python dependencies for known vulnerabilities
        run: |
          pip install --no-cache-dir pip-audit
          pip-audit -r backend/requirements.txt

      - name: Run database migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Run backend unit tests
        run: python -m pytest tests/backend/unit -q

      # --cov-append accumulates onto the unit run's coverage data rather
      # than starting fresh, so the threshold below the security step gates
      # cumulative unit+integration+security coverage (~89% currently), not
      # any single suite's coverage in isolation.
      - name: Run backend integration tests
        run: python -m pytest tests/backend/integration -q --cov-append

      # Coverage is currently ~89% (see docs/testing/overview.md); the gate
      # is set a few points below that as a regression alarm, not a strict
      # target, so incidental coverage drift doesn't flap CI red.
      - name: Run backend security tests
        run: python -m pytest tests/backend/security -q --cov-append --cov-fail-under=85

      # Informational only: these assert generous, regression-alarm-level
      # thresholds (not a strict SLA) against a real Postgres/Redis, so
      # timing can be noisy on shared GitHub-hosted runners. A failure here
      # should prompt a look, not block the merge.
      - name: Run backend performance tests (non-blocking)
        continue-on-error: true
        run: python -m pytest tests/backend/performance -q

  frontend:
    name: Frontend (typecheck + lint + test + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Audit npm dependencies for known vulnerabilities
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Type-check
        working-directory: frontend
        run: npm run typecheck

      - name: Lint
        working-directory: frontend
        run: npm run lint

      # test:coverage (not plain test) so vitest.config.ts's coverage
      # thresholds are actually evaluated — plain `vitest run` never
      # collects coverage, so thresholds would silently never be checked.
      - name: Run tests (with coverage threshold gate)
        working-directory: frontend
        run: npm run test:coverage

      - name: Build
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Docker image build verification
    runs-on: ubuntu-latest

    # Confirms backend and frontend Dockerfiles still build correctly.
    # No registry push or deployment is performed in this workflow.

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f docker/backend.Dockerfile -t backend:ci .

      - name: Build frontend production image
        run: docker build --target production -f docker/frontend.Dockerfile -t frontend:ci .