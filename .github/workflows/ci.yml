name: CI

# Runs on every push and pull request targeting main. Four independent jobs
# (backend, frontend, secrets scan, docker build) run in parallel.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default: none of these jobs need write access, they only
# check out code and run tests/builds. Explicit here rather than relying on
# the repo/org's default GITHUB_TOKEN permissions.
permissions:
  contents: read

jobs:
  backend:
    name: Backend (unit + integration)
    runs-on: ubuntu-latest

    services:
      postgres:
        # AWS ECR Public mirror of the Docker Official postgres image, not
        # Docker Hub directly — sidesteps Docker Hub's anonymous-pull rate
        # limiting, which is the most common cause of GitHub-hosted runners
        # timing out ("context deadline exceeded") pulling service containers.
        image: public.ecr.aws/docker/library/postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mystic_auth_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mystic_auth_ci"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      redis:
        # Same ECR Public mirror reasoning as postgres above.
        image: public.ecr.aws/docker/library/redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      # Test-only values — never real secrets. Settings requires every one
      # of these to be set, so CI provides them directly as environment
      # variables instead of using a checked-in .env file.
      BACKEND_BASE_URL: http://localhost:8000
      FRONTEND_BASE_URL: http://localhost:5173

      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/mystic_auth_ci
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mystic_auth_ci

      SECRET_KEY: ci-test-secret-key-not-for-production-use-only

      ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      REFRESH_TOKEN_EXPIRE_MINUTES: "43200"
      JWT_ALGORITHM: HS256
      RESET_TOKEN_EXPIRE_MINUTES: "60"

      GOOGLE_CLIENT_ID: ci-test-google-client-id
      GOOGLE_CLIENT_SECRET: ci-test-google-client-secret
      GOOGLE_REDIRECT_URI: http://localhost:8000/auth/oauth2/callback/google

      REDIS_URL: redis://localhost:6379/0
      CACHE_DEFAULT_TTL: "300"

      FROM_EMAIL: ci-test@example.com
      GMAIL_APP_PASSWORD: ci-test-app-password

      APP_NAME: MysticAuth

      LOGIN_LOCKOUT_TIME: "300"
      MAX_FAILED_LOGIN_ATTEMPTS: "5"
      LOGIN_LOCKOUT_TIME_PER_IP: "300"
      MAX_FAILED_LOGIN_ATTEMPTS_PER_IP: "20"

      MAX_REQUESTS_PER_WINDOW: "100"
      REQUEST_WINDOW_SECONDS: "60"

      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install --no-cache-dir -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Audit Python dependencies for known vulnerabilities
        run: |
          pip install --no-cache-dir pip-audit
          pip-audit -r backend/requirements.txt

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check app mystic_auth alembic ../tests/backend

      - name: Type-check (mypy)
        working-directory: backend
        run: mypy app mystic_auth

      - name: Security scan (bandit)
        working-directory: backend
        run: bandit -r app mystic_auth -c pyproject.toml

      - name: Run database migrations
        working-directory: backend
        run: alembic upgrade head

      # Regression guard: fails if a model's columns/indexes drift from what
      # the migrations actually create.
      - name: Verify models match migrations (alembic check)
        working-directory: backend
        run: alembic check

      # tests/backend/app covers the app/ wrapper layer; tests/backend/mystic_auth/unit
      # covers the mystic_auth/ package — both fast, no-DB, run as one coverage base.
      - name: Run backend unit tests
        run: python -m pytest tests/backend/app tests/backend/mystic_auth/unit -q

      # --cov-append accumulates onto the unit run's coverage data, so the
      # threshold below gates cumulative unit+integration+security coverage.
      - name: Run backend integration tests
        run: python -m pytest tests/backend/mystic_auth/integration -q --cov-append

      # Coverage is currently ~89% (see docs/mystic_auth/testing/overview.md); the gate
      # is a regression alarm a few points below that, not a strict target.
      - name: Run backend security tests
        run: python -m pytest tests/backend/mystic_auth/security -q --cov-append --cov-fail-under=85

      # Non-blocking: asserts generous regression-alarm thresholds against a
      # real Postgres/Redis, so timing can be noisy on shared runners.
      - name: Run backend performance tests (non-blocking)
        continue-on-error: true
        run: python -m pytest tests/backend/mystic_auth/performance -q

  frontend:
    name: Frontend (typecheck + lint + test + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Pinned patch version: ESLint 10 and Vite 8 both require a Node 20
          # floor above some earlier 20.x releases, so major-only "20" isn't
          # precise enough to guarantee compatibility.
          node-version: "20.20.2"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Audit npm dependencies for known vulnerabilities
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Type-check
        working-directory: frontend
        run: npm run typecheck

      - name: Lint
        working-directory: frontend
        run: npm run lint

      # test:coverage (not plain test) so vitest.config.ts's coverage
      # thresholds are actually evaluated.
      - name: Run tests (with coverage threshold gate)
        working-directory: frontend
        run: npm run test:coverage

      - name: Build
        working-directory: frontend
        run: npm run build

  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks scans git history, not just the working tree — needs
          # the full commit log, not just the last commit, to catch a
          # secret that was committed and later removed.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build:
    name: Docker image build verification
    runs-on: ubuntu-latest

    # Confirms backend and frontend Dockerfiles still build correctly.
    # No registry push or deployment is performed in this workflow.

    steps:
      - uses: actions/checkout@v4

      # Validates both compose files still parse and reference existing
      # service dependencies. Uses .env.example only to satisfy each file's
      # `env_file: ./.env` directive — no real secrets involved.
      - name: Validate docker-compose configs
        run: |
          cp .env.example .env
          docker compose -f docker-compose.yml config > /dev/null
          docker compose -f docker-compose.prod.yml config > /dev/null
          rm .env

      - name: Build backend image
        run: docker build -f docker/backend.Dockerfile -t backend:ci .

      - name: Build frontend production image
        run: docker build --target production -f docker/frontend.Dockerfile -t frontend:ci .

      # Regression guard: backend/logs/ (real request data) was previously
      # getting baked into the image via `COPY backend/ .`, since *.log alone
      # doesn't match rotated filenames like access.log.2026-07-19. Fixed via
      # .dockerignore; this catches it coming back.
      - name: Verify no local logs leaked into the backend image
        run: |
          docker run --rm backend:ci sh -c 'test ! -d /app/logs' \
            && echo "OK: /app/logs absent from the built image" \
            || (echo "FAIL: /app/logs was copied into the built image — check .dockerignore" && exit 1)